<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>مثوى | AL TAAWN BUILDING Dashboard</title>
  <link rel="icon" type="image/png" href="./favicon.png">
  <link rel="shortcut icon" type="image/png" href="./favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;900&family=Playfair+Display:ital,wght@1,700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --espresso: #0F0A06;
      --card-bg: #1A1208;
      --card-elevated: #2D1E10;
      --gold: #C9A96E;
      --gold-light: #E8D4A8;
      --gold-dim: #6B5430;
      --gold-soft: rgba(201,169,110,0.12);
      --text-primary: #F5EDE0;
      --text-muted: rgba(245,237,224,0.5);
      --success: #95D5B2;
      --warning: #FFD166;
      --danger: #FCA5A5;
      --danger-bg: rgba(252,165,165,0.08);
      --hero-radial-1: rgba(201,169,110,0.22);
      --hero-radial-2: rgba(201,169,110,0.08);
      --surface-line: rgba(201,169,110,0.14);
      --surface-line-strong: rgba(201,169,110,0.32);
      --shadow-deep: rgba(0,0,0,0.34);
      --white-soft: rgba(255,255,255,0.05);
      --mask-fade: rgba(0,0,0,0.7);
      --toggle-bg: rgba(26,18,8,0.88);
      --gold-wash-10: rgba(201,169,110,0.1);
      --gold-wash-06: rgba(201,169,110,0.06);
      --gold-wash-04: rgba(201,169,110,0.04);
      --gold-wash-03: rgba(201,169,110,0.03);
      --gold-wash-025: rgba(201,169,110,0.025);
      --gold-border-soft: rgba(201,169,110,0.15);
      --text-surface-08: rgba(245,237,224,0.08);
      --text-surface-06: rgba(245,237,224,0.06);
      --danger-wash-72: rgba(252,165,165,0.72);
      --danger-wash-70: rgba(252,165,165,0.7);
      --danger-border-soft: rgba(252,165,165,0.2);
      --danger-border-mid: rgba(252,165,165,0.15);
      --danger-border-faint: rgba(252,165,165,0.12);
      --danger-border-strong: rgba(252,165,165,0.25);
      --danger-bg-soft: rgba(252,165,165,0.05);
      --danger-bg-faint: rgba(252,165,165,0.04);
      --warning-bg-soft: rgba(255,209,102,0.08);
      --warning-bg-mid: rgba(255,209,102,0.09);
      --warning-border-soft: rgba(255,209,102,0.24);
      --warning-border-mid: rgba(255,209,102,0.25);
      --print-bg: #FFFFFF;
      --print-text: #18120F;
      --print-muted: rgba(24,18,15,0.65);
      --print-line: rgba(24,18,15,0.16);
      --print-line-strong: rgba(24,18,15,0.3);
      --print-grid: rgba(24,18,15,0.04);
      --branch-a: #C9A96E;
      --branch-b: #FFD166;
      --grid-accent: rgba(201,169,110,0.06);
      --chart-indirect: rgba(232,212,168,0.22);
      --danger-solid-soft: rgba(252,165,165,0.22);
      --lux-ease: cubic-bezier(0.22, 1, 0.36, 1);
      --font-body: "Tajawal", sans-serif;
      --font-display: "Playfair Display", serif;
      --font-mono: "JetBrains Mono", monospace;
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      font-family: var(--font-body);
      color: var(--text-primary);
      overflow-x: hidden;
      background:
        radial-gradient(circle at top center, var(--hero-radial-1), transparent 34%),
        radial-gradient(circle at 15% 20%, var(--hero-radial-2), transparent 24%),
        linear-gradient(180deg, var(--espresso), var(--card-bg));
      line-height: 1.65;
      transition:
        background 500ms var(--lux-ease),
        color 500ms var(--lux-ease);
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image:
        linear-gradient(var(--grid-accent) 1px, transparent 1px),
        linear-gradient(90deg, var(--grid-accent) 1px, transparent 1px);
      background-size: 120px 120px;
      mask-image: linear-gradient(180deg, var(--mask-fade), transparent 92%);
      opacity: 0.5;
    }

    button,
    a,
    canvas,
    .metric-card,
    .gauge-card,
    .insight-card,
    .summary-tile {
      transition:
        color 320ms var(--lux-ease),
        background-color 320ms var(--lux-ease),
        border-color 320ms var(--lux-ease),
        transform 320ms var(--lux-ease),
        opacity 320ms var(--lux-ease),
        box-shadow 320ms var(--lux-ease);
    }

    .lang-toggle {
      position: fixed;
      inset-block-start: 1.5rem;
      inset-inline-end: 1.5rem;
      z-index: 20;
      border: 1px solid var(--surface-line-strong);
      background: var(--toggle-bg);
      color: var(--gold-light);
      border-radius: 999px;
      font-family: var(--font-mono);
      font-size: 0.9rem;
      padding: 0.72rem 1rem;
      letter-spacing: 0.08em;
      cursor: pointer;
      box-shadow: 0 18px 50px var(--shadow-deep);
    }

    .lang-toggle:hover {
      transform: translateY(-2px);
      border-color: var(--gold);
    }

    .page {
      position: relative;
      width: min(1400px, calc(100% - 2rem));
      margin: 0 auto;
      padding: 3rem 0 2rem;
    }

    .hero {
      padding-top: 0.35rem;
    }

    .hero-grid,
    .gap-grid,
    .cost-grid,
    .charts-grid,
    .insights-grid,
    .footer-grid {
      display: grid;
      gap: 1.1rem;
    }

    .hero-grid {
      grid-template-columns: minmax(0, 1.25fr) minmax(340px, 0.75fr);
      align-items: start;
    }

    .hero-grid > *,
    .gap-grid > *,
    .cost-grid > *,
    .charts-grid > *,
    .insights-grid > *,
    .footer-grid > * {
      min-width: 0;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 0.65rem;
      padding: 0.55rem 1rem;
      border-radius: 999px;
      color: var(--gold-light);
      background: var(--gold-soft);
      border: 1px solid var(--surface-line);
      font-size: 0.92rem;
      font-weight: 500;
      letter-spacing: 0.02em;
    }

    .hero-title {
      margin: 1.25rem 0 0.5rem;
      font-size: clamp(2.6rem, 5vw, 4.7rem);
      line-height: 1.05;
      font-weight: 900;
    }

    [dir="ltr"] .hero-title,
    [dir="ltr"] .section-title {
      font-family: var(--font-display);
      font-style: italic;
      font-weight: 700;
      letter-spacing: 0.01em;
    }

    .hero-subtitle {
      margin: 0 0 1.2rem;
      color: var(--gold-light);
      font-family: var(--font-display);
      font-style: italic;
      font-size: clamp(1.2rem, 2vw, 1.7rem);
    }

    .hero-body {
      max-width: 64ch;
      margin: 0;
      color: var(--text-muted);
      font-size: 1.08rem;
    }

    .alert-banner {
      margin-top: 1.6rem;
      border: 1px solid var(--danger);
      background: var(--danger-bg);
      border-radius: 1rem;
      padding: 1rem 1.5rem;
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 1rem;
      align-items: start;
    }

    .alert-icon {
      font-size: 1.4rem;
      line-height: 1;
      color: var(--danger);
    }

    .alert-text {
      display: grid;
      gap: 0.3rem;
    }

    .alert-primary {
      color: var(--text-primary);
      font-size: 1rem;
      font-weight: 700;
    }

    .alert-secondary {
      color: var(--danger);
      font-size: 0.97rem;
    }

    .summary-card .card-core {
      padding: 1.7rem;
      background:
        radial-gradient(circle at top, var(--gold-wash-10), transparent 60%),
        var(--card-bg);
    }

    .summary-caption {
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.16em;
      font-size: 0.72rem;
      margin-bottom: 0.75rem;
    }

    .summary-value {
      font-family: var(--font-mono);
      font-size: clamp(2.2rem, 4vw, 3rem);
      color: var(--danger);
      font-weight: 600;
      line-height: 1;
      margin-bottom: 0.75rem;
    }

    .summary-body {
      color: var(--text-muted);
      margin: 0 0 1.35rem;
    }

    .summary-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 0.9rem;
    }

    .summary-tile {
      padding: 0.95rem 1rem;
      border-radius: 1.2rem;
      background: var(--gold-wash-04);
      border: 1px solid var(--surface-line);
    }

    .summary-label {
      display: block;
      color: var(--text-muted);
      font-size: 0.78rem;
      margin-bottom: 0.35rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .summary-number {
      font-family: var(--font-mono);
      font-size: 1rem;
      color: var(--gold-light);
    }

    .page > section + section {
      margin-top: 2rem;
    }

    .section-header {
      margin-bottom: 0.9rem;
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 1rem;
      flex-wrap: wrap;
    }

    .section-title {
      margin: 0;
      font-size: clamp(1.8rem, 3vw, 2.8rem);
      line-height: 1.1;
    }

    .section-subtitle {
      margin: 0.35rem 0 0;
      color: var(--gold-light);
      font-family: var(--font-display);
      font-style: italic;
      font-size: 1.02rem;
    }

    .section-note {
      color: var(--text-muted);
      max-width: 32ch;
      font-size: 0.95rem;
      text-align: end;
    }

    .card-shell {
      background: var(--gold-wash-06);
      border: 0.5px solid var(--gold-border-soft);
      border-radius: 2rem;
      padding: 6px;
      box-shadow: 0 18px 70px var(--shadow-deep);
    }

    .card-core {
      background: var(--card-bg);
      border-radius: calc(2rem - 6px);
      padding: 2rem;
      box-shadow: inset 0 1px 1px var(--white-soft);
      height: 100%;
    }

    .gap-grid,
    .cost-grid,
    .charts-grid,
    .footer-grid {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    .single-branch-grid {
      grid-template-columns: 1fr;
    }

    .gauge-card .card-core {
      display: grid;
      gap: 1.25rem;
      background:
        linear-gradient(180deg, var(--gold-wash-06), transparent 22%),
        var(--card-bg);
    }

    .branch-header {
      display: flex;
      align-items: start;
      justify-content: space-between;
      gap: 1rem;
      border-bottom: 1px solid var(--surface-line);
      padding-bottom: 1rem;
    }

    .branch-tag {
      display: inline-flex;
      align-items: center;
      gap: 0.55rem;
      color: var(--gold-light);
      font-size: 0.8rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .branch-dot {
      width: 0.7rem;
      height: 0.7rem;
      border-radius: 999px;
      background: var(--branch-color);
      box-shadow: 0 0 0 4px var(--gold-wash-10);
    }

    .branch-name {
      margin: 0.45rem 0 0;
      font-size: 1.5rem;
      font-weight: 800;
    }

    .branch-meta {
      color: var(--text-muted);
      font-size: 0.92rem;
      text-align: end;
    }

    .gauge-summary {
      display: grid;
      gap: 1rem;
    }

    .gauge-row {
      display: grid;
      gap: 0.7rem;
    }

    .gauge-topline {
      display: flex;
      justify-content: space-between;
      gap: 1rem;
      align-items: baseline;
    }

    .gauge-label {
      color: var(--text-muted);
      font-size: 0.92rem;
    }

    .gauge-percent {
      font-family: var(--font-mono);
      font-size: clamp(1.65rem, 3vw, 2.4rem);
      font-weight: 600;
    }

    .gauge-percent.gold {
      color: var(--gold-light);
    }

    .gauge-percent.danger {
      color: var(--danger);
    }

    .bar-track {
      height: 1.05rem;
      border-radius: 999px;
      overflow: hidden;
      background: var(--text-surface-08);
      border: 1px solid var(--text-surface-06);
      position: relative;
    }

    .bar-fill {
      height: 100%;
      width: 100%;
      transform: scaleX(0);
      transition: transform 1000ms var(--lux-ease);
      border-radius: inherit;
    }

    [dir="rtl"] .bar-fill {
      transform-origin: right center;
    }

    [dir="ltr"] .bar-fill {
      transform-origin: left center;
    }

    .bar-fill.gold {
      background: linear-gradient(90deg, var(--gold-dim), var(--gold));
    }

    .bar-fill.danger {
      background: linear-gradient(90deg, var(--danger-wash-72), var(--danger));
    }

    .is-visible .bar-fill {
      transform: scaleX(var(--target-scale));
    }

    .gap-loss {
      padding: 1.15rem 1.25rem;
      border-radius: 1.4rem;
      background: var(--danger-bg);
      border: 1px solid var(--danger-border-soft);
    }

    .loss-label {
      color: var(--text-muted);
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .loss-value {
      margin-top: 0.45rem;
      font-family: var(--font-mono);
      font-size: clamp(1.85rem, 3vw, 2.7rem);
      color: var(--danger);
      font-weight: 600;
      line-height: 1;
    }

    .loss-caption {
      margin-top: 0.35rem;
      color: var(--danger);
      font-size: 0.95rem;
    }

    .kpi-strip {
      display: grid;
      gap: 1rem;
      min-width: 0;
    }

    .kpi-row {
      position: relative;
      min-width: 0;
      max-width: 100%;
    }

    .kpi-row::before {
      content: "";
      position: absolute;
      inset-inline-start: 0;
      inset-inline-end: 0;
      inset-block-start: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--branch-color), transparent);
    }

    .kpi-card-shell .card-core {
      padding: 1.2rem 1.15rem;
    }

    .kpi-row-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      padding: 0.75rem 0 0.3rem;
    }

    .kpi-row-title {
      font-weight: 800;
      font-size: 1.25rem;
    }

    .kpi-row-subtitle {
      color: var(--text-muted);
      font-size: 0.9rem;
    }

    .kpi-scroll {
      display: grid;
      grid-template-columns: repeat(6, minmax(180px, 1fr));
      gap: 1rem;
      scroll-snap-type: x proximity;
    }

    .metric-card {
      height: 100%;
      scroll-snap-align: start;
    }

    .metric-label {
      color: var(--text-muted);
      font-size: 0.82rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      min-height: 2.05em;
    }

    .metric-value {
      margin-top: 0.75rem;
      font-family: var(--font-mono);
      font-size: 1.32rem;
      font-weight: 600;
      line-height: 1.15;
    }

    .metric-foot {
      margin-top: 0.55rem;
      color: var(--text-muted);
      font-size: 0.82rem;
    }

    .metric-loss .card-core {
      background:
        linear-gradient(180deg, var(--danger-bg-faint), transparent 45%),
        var(--card-bg);
      border: 1px solid var(--danger-border-faint);
    }

    .metric-loss .metric-value,
    .metric-loss .metric-foot {
      color: var(--danger);
    }

    .comparison-card .card-core,
    .chart-card .card-core,
    .cost-card .card-core,
    .insight-card .card-core {
      display: grid;
      gap: 1.2rem;
    }

    .table-wrap {
      overflow-x: auto;
      border-radius: 1.4rem;
      border: 1px solid var(--surface-line);
      -webkit-overflow-scrolling: touch;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 1120px;
    }

    th,
    td {
      padding: 1rem 0.95rem;
      border-bottom: 1px solid var(--surface-line);
      text-align: start;
      vertical-align: top;
    }

    thead th {
      background: var(--surface-line);
      color: var(--gold-light);
      font-weight: 700;
      font-size: 0.9rem;
      white-space: nowrap;
    }

    tbody tr:last-child td {
      border-bottom: 0;
    }

    tbody td {
      color: var(--text-primary);
      font-size: 0.95rem;
    }

    .mono {
      font-family: var(--font-mono);
      white-space: nowrap;
    }

    .muted {
      color: var(--text-muted);
    }

    .branch-badge,
    .status-badge,
    .arrow-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.4rem;
      border-radius: 999px;
      padding: 0.38rem 0.72rem;
      font-size: 0.82rem;
      font-weight: 700;
      line-height: 1;
      white-space: nowrap;
      border: 1px solid transparent;
    }

    .branch-badge {
      background: var(--gold-wash-10);
      color: var(--gold-light);
      border-color: var(--surface-line);
    }

    .status-badge.danger,
    .arrow-badge.danger {
      color: var(--danger);
      background: var(--danger-bg);
      border-color: var(--danger-border-strong);
    }

    .status-badge.warning,
    .arrow-badge.warning {
      color: var(--warning);
      background: var(--warning-bg-soft);
      border-color: var(--warning-border-soft);
    }

    .chart-stage {
      display: grid;
      gap: 1rem;
      min-height: 300px;
    }

    .chart-stage canvas {
      width: 100%;
      height: 100%;
      min-height: 250px;
    }

    .chart-note,
    .chart-fallback {
      color: var(--text-muted);
      font-size: 0.9rem;
    }

    .chart-fallback[hidden] {
      display: none;
    }

    .subtable {
      border: 1px solid var(--surface-line);
      border-radius: 1.4rem;
      overflow: hidden;
      background: var(--gold-wash-025);
    }

    .subtable-head {
      padding: 0.9rem 1rem;
      border-bottom: 1px solid var(--surface-line);
      color: var(--gold-light);
      font-weight: 700;
    }

    .subtable table {
      min-width: 100%;
    }

    .subtable td,
    .subtable th {
      padding: 0.82rem 1rem;
    }

    .subtable tr.total-row td {
      border-top: 1px solid var(--gold-dim);
      font-weight: 700;
      color: var(--gold-light);
    }

    .cost-bridge {
      display: grid;
      gap: 0.65rem;
      padding: 1rem 1.1rem;
      border-radius: 1.3rem;
      background: var(--danger-bg-soft);
      border: 1px solid var(--danger-border-mid);
    }

    .cost-bridge-head {
      display: flex;
      justify-content: space-between;
      gap: 1rem;
      font-size: 0.9rem;
      color: var(--text-muted);
    }

    .bridge-track {
      position: relative;
      height: 1.15rem;
      border-radius: 999px;
      background: var(--text-surface-08);
      overflow: hidden;
      border: 1px solid var(--text-surface-06);
    }

    .bridge-commission,
    .bridge-gap {
      position: absolute;
      inset-block: 0;
      transform: scaleX(0);
      transition: transform 1100ms var(--lux-ease);
    }

    .bridge-commission {
      inset-inline-start: 0;
      background: linear-gradient(90deg, var(--gold-dim), var(--gold));
    }

    .bridge-gap {
      background: linear-gradient(90deg, var(--danger-wash-70), var(--danger));
    }

    [dir="rtl"] .bridge-commission,
    [dir="rtl"] .bridge-gap {
      transform-origin: right center;
    }

    [dir="ltr"] .bridge-commission,
    [dir="ltr"] .bridge-gap {
      transform-origin: left center;
    }

    .is-visible .bridge-commission {
      transform: scaleX(var(--commission-scale));
    }

    .is-visible .bridge-gap {
      transform: scaleX(var(--gap-scale));
    }

    .bridge-foot {
      display: flex;
      justify-content: space-between;
      gap: 1rem;
      color: var(--danger);
      font-size: 0.88rem;
    }

    .insights-grid {
      grid-template-columns: repeat(3, minmax(0, 1fr));
    }

    .insight-card .card-core {
      background:
        linear-gradient(180deg, var(--gold-wash-06), transparent 40%),
        var(--card-bg);
    }

    .card-badge-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
    }

    .card-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0.4rem 0.75rem;
      border-radius: 999px;
      font-size: 0.8rem;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      border: 1px solid transparent;
    }

    .card-badge.danger {
      color: var(--danger);
      background: var(--danger-bg);
      border-color: var(--danger-border-strong);
    }

    .card-badge.warning {
      color: var(--warning);
      background: var(--warning-bg-mid);
      border-color: var(--warning-border-mid);
    }

    .card-badge.gold {
      color: var(--gold-light);
      background: var(--gold-wash-10);
      border-color: var(--surface-line);
    }

    .insight-title {
      margin: 0;
      font-size: 1.45rem;
      line-height: 1.2;
    }

    .insight-body {
      margin: 0;
      color: var(--text-muted);
      font-size: 1rem;

    .occupancy-grid,
    .architecture-grid,
    .revenue-grid,
    .media-grid,

    .overview-grid {

    .timeline-grid,
    .meta-grid,
    .ring-grid,
    .video-grid,

      grid-template-columns: repeat(3, minmax(0, 1fr));

    .unit-badge {

    .unit-id {

    .floor-note {
      margin: 0.85rem 0 0;
      color: var(--text-muted);
      font-size: 0.9rem;

      grid-template-columns: repeat(3, minmax(0, 1fr));

      margin: 1rem 0 0.9rem;

      align-items: center;
      justify-content: space-between;

      th,

      table {
        min-width: 940px;

      .chart-stage {
        min-height: 240px;

      .subtable td,

      .timeline-grid,

      .ring-grid,
      .footer-stat-row,

      .occupancy-kpi-grid,

      .marketing-kpi-grid,
      .unit-grid {
        grid-template-columns: 1fr;
      }

      .section-header,
      .branch-header,
      .gauge-topline,
      .kpi-row-head,
      .cost-bridge-head,
      .bridge-foot,
      .card-badge-row {
        flex-direction: column;
        align-items: start;
      }

      .branch-meta {
        text-align: start;
      }

      .progress-meta,
      .overview-stat,
      .floor-head,

        grid-template-columns: 1fr;
        flex-direction: column;
        align-items: start;

        --text-muted: var(--print-muted);

      body {
        background: var(--print-bg);
        color: var(--print-text);
      }

      body::before,
      .lang-toggle,
      .screen-only {
        display: none !important;
      }

      .print-only {
        display: block;
      }

      .page {
        width: 100%;
        padding: 0;
      }

      .card-shell {
        box-shadow: none;
      }

      .reveal {
        opacity: 1 !important;
        transform: none !important;
      }

      .chart-card canvas,
      .chart-fallback,
      .chart-note {
        display: none !important;
      }

      .hero-grid,
      .gap-grid,
      .cost-grid,
      .charts-grid,
      .insights-grid,
      .footer-grid {
        grid-template-columns: 1fr;
      }

      table,
      .subtable table {
        min-width: 100%;
      }
    }

                      '</div>' +
                      '<div class="bridge-foot">' +
                        '<span>' + escapeHtml(copy.labels.commissionAmount) + ': <span class="mono">' + formatCurrency(branch.commissionTotal) + '</span></span>' +
                        '<span>' + escapeHtml(copy.labels.shortfall) + ': <span class="mono">' + formatCurrency(getBranchGap(branch)) + '</span></span>' +
                      '</div>' +
                    '</div>' +
                  '</div>' +
                '</div>';
            }).join("") +
          '</div>' +
        '</section>';
    }

    function buildInsightsSection(copy) {
      const section = DATA.keyInsights;
      return '' +
        '<section>' +
          buildSectionHeader(localize(section.title), localize(section.subtitle), "") +
          '<div class="insight-kpi-grid" style="margin-bottom:1rem;">' +
            '<div class="premium-kpi reveal"><div class="premium-kpi-label">' + escapeHtml(state.lang === "ar" ? "Full Occupancy KPI" : "Full Occupancy KPI") + '</div><div class="premium-kpi-value">' + countMarkup(section.fullOccupancy, "currency") + '</div></div>' +
            '<div class="premium-kpi reveal"><div class="premium-kpi-label">' + escapeHtml(state.lang === "ar" ? "Actual" : "Actual") + '</div><div class="premium-kpi-value">' + countMarkup(section.actual, "currency") + '</div></div>' +
            '<div class="premium-kpi reveal"><div class="premium-kpi-label">' + escapeHtml(state.lang === "ar" ? "Achievement" : "Achievement") + '</div><div class="premium-kpi-value">' + countMarkup(section.achievement, "percent") + '</div></div>' +
          '</div>' +
          '<div class="insights-grid stagger-grid">' +
            section.cards.map(function (item) {
              return '' +
                '<article class="card-shell insight-card reveal">' +
                  '<div class="card-core">' +
                    '<div class="card-badge-row">' +
                      '<span class="card-badge ' + escapeHtml(item.tone) + '">' + escapeHtml(localize(item.badge)) + '</span>' +
                    '</div>' +
                    '<h3 class="insight-title">' + escapeHtml(localize(item.title)) + '</h3>' +
                    '<p class="insight-body">' + escapeHtml(localize(item.body)) + '</p>' +
                  '</div>' +
                '</article>';
            }).join("") +
          '</div>' +
        '</section>';
    }

    function buildFooter(copy) {
      return '' +
        '<footer style="margin-top:2rem;">' +
          '<div class="footer-grid">' +
            '<div class="card-shell footer-card reveal">' +
              '<div class="card-core">' +
                '<div class="footer-brand">' + escapeHtml(copy.footer.brand) + '</div>' +
                '<div class="footer-meta">' + escapeHtml(copy.footer.preparedAr) + '</div>' +
              '</div>' +
            '</div>' +
            '<div class="card-shell footer-card reveal">' +
              '<div class="card-core">' +
                '<div class="footer-meta">' + escapeHtml(copy.footer.dateAr) + '</div>' +
                '<div class="footer-meta">' + escapeHtml(copy.footer.preparedEn) + '</div>' +
              '</div>' +
            '</div>' +
          '</div>' +
        '</footer>';
    }

    function renderApp() {
      const copy = getCopy();
      document.documentElement.lang = copy.lang;
      document.documentElement.dir = copy.dir;
      document.getElementById("langToggle").textContent = copy.toggle;

      const html = '' +
        '<div class="page">' +
          buildHero(copy) +
          buildExecutiveSummarySection() +
          buildBuildingOverviewSection() +
          buildOccupancySection() +
          buildArchitectureSection() +
          buildRevenuePerformanceSection() +
          buildContractProgressSection() +
          buildGapSection(copy) +
          buildKpiSection(copy) +
          buildComparisonSection(copy) +
          buildChartsSection(copy) +
          buildMarketingSection() +
          buildCampaignVideosSection() +
          buildTikTokSection() +
          buildInvestmentSection() +
          buildCostSection(copy) +
          buildFeeScheduleSection() +
          buildInsightsSection(copy) +
          buildFooter(copy) +
        '</div>';

      document.getElementById("app").innerHTML = html;
      initObservers();
      initCharts();
    }

    function destroyCharts() {
      state.charts.forEach(function (chart) {
        chart.destroy();
      });
      state.charts = [];
    }

    function getCssVar(name) {
      return getComputedStyle(document.documentElement).getPropertyValue(name).trim();
    }

    function chartLabelColor() {
      return getCssVar("--gold-light");
    }

    function baseChartOptions() {
      return {
        responsive: true,
        maintainAspectRatio: false,
        animation: {
          duration: 1200,
          easing: "easeOutQuart"
        },
        plugins: {
          legend: {
            labels: {
              color: chartLabelColor(),
              font: {
                family: "Tajawal"
              }
            }
          },
          tooltip: {
            backgroundColor: getCssVar("--card-elevated"),
            titleColor: getCssVar("--gold-light"),
            bodyColor: getCssVar("--text-primary"),
            borderColor: getCssVar("--surface-line-strong"),
            borderWidth: 1,
            callbacks: {
              label: function (context) {
                return context.dataset.label + ": " + formatCurrency(context.parsed.y ?? context.parsed);
              }
            }
          }
        }
      };
    }

    function initCharts() {
      destroyCharts();

      if (!window.Chart) {
        ["chartFallbackA", "chartFallbackB"].forEach(function (id) {
          const node = document.getElementById(id);
          if (node) {
            node.hidden = false;
          }
        });
        return;
      }

      Chart.defaults.color = chartLabelColor();
      Chart.defaults.borderColor = "transparent";
      Chart.defaults.font.family = "Tajawal";

      const copy = getCopy();
      const branchLabels = DATA.branches.map(function (branch) {
        return branch.name[state.lang];
      });

      const commissionCostCtx = document.getElementById("commissionCostChart");
      if (commissionCostCtx) {
        state.charts.push(new Chart(commissionCostCtx, {
          type: "bar",
          data: {
            labels: branchLabels,
            datasets: [
              {
                label: copy.labels.totalRevenue,
                data: DATA.branches.map(function (branch) { return branch.totalRevenue; }),
                backgroundColor: getCssVar("--gold"),
                borderRadius: 14
              },
              {
                label: copy.labels.netRevenue,
                data: DATA.branches.map(function (branch) { return branch.netRevenue; }),
                backgroundColor: getCssVar("--gold-dim"),
                borderRadius: 14
              },
              {
                label: copy.labels.totalDeductions,
                data: DATA.branches.map(function (branch) { return branch.totalDeductions; }),
                backgroundColor: getCssVar("--danger-solid-soft"),
                borderRadius: 14
              }
            ]
          },
          options: Object.assign(baseChartOptions(), {
            scales: {
              x: {
                grid: {
                  display: false
                },
                ticks: {
                  color: chartLabelColor()
                }
              },
              y: {
                grid: {
                  color: "transparent"
                },
                ticks: {
                  color: chartLabelColor(),
                  callback: function (value) {
                    return formatNumber(value);
                  }
                }
              }
            }
          })
        }));
      }

      const costBreakdownCtx = document.getElementById("costBreakdownChart");
      if (costBreakdownCtx) {
        state.charts.push(new Chart(costBreakdownCtx, {
          type: "bar",
          data: {
            labels: branchLabels,
            datasets: [
              {
                label: copy.labels.directCosts,
                data: DATA.branches.map(function (branch) { return branch.directCosts.subtotal; }),
                backgroundColor: getCssVar("--gold-dim"),
                borderRadius: 14,
                stack: "costs"
              },
              {
                label: copy.labels.indirectCosts,
                data: DATA.branches.map(function (branch) { return branch.indirectCosts.subtotal; }),
                backgroundColor: getCssVar("--chart-indirect"),
                borderColor: getCssVar("--gold-light"),
                borderWidth: 1,
                borderRadius: 14,
                stack: "costs"
              }
            ]
          },
          options: Object.assign(baseChartOptions(), {
            scales: {
              x: {
                stacked: true,
                grid: {
                  display: false
                },
                ticks: {
                  color: chartLabelColor()
                }
              },
              y: {
                stacked: true,
                grid: {
                  color: "transparent"
                },
                ticks: {
                  color: chartLabelColor(),
                  callback: function (value) {
                    return formatNumber(value);
                  }
                }
              }
            }
          })
        }));
      }

      const occupancyCtx = document.getElementById("occupancyMonthlyChart");
      if (occupancyCtx) {
        state.charts.push(new Chart(occupancyCtx, {
          type: "bar",
          data: {
            labels: DATA.occupancy.monthly.map(function (item) { return item.label; }),
            datasets: [
              {
                label: state.lang === "ar" ? "الإشغال الشهري" : "Monthly Occupancy",
                data: DATA.occupancy.monthly.map(function (item) { return item.value * 100; }),
                backgroundColor: DATA.occupancy.monthly.map(function (item) {
                  if (item.value < 0.4) return getCssVar("--danger");
                  if (item.value < 0.75) return "#7FB6E8";
                  return getCssVar("--gold");
                }),
                borderRadius: 14
              }
            ]
          },
          options: Object.assign(baseChartOptions(), {
            plugins: {
              legend: { display: false },
              tooltip: {
                backgroundColor: getCssVar("--card-elevated"),
                titleColor: getCssVar("--gold-light"),
                bodyColor: getCssVar("--text-primary"),
                borderColor: getCssVar("--surface-line-strong"),
                borderWidth: 1,
                callbacks: {
                  label: function (context) {
                    return context.dataset.label + ": " + context.parsed.y + "%";
                  }
                }
              }
            },
            scales: {
              x: {
                grid: { display: false },
                ticks: { color: chartLabelColor() }
              },
              y: {
                beginAtZero: true,
                max: 100,
                grid: { color: "transparent" },
                ticks: {
                  color: chartLabelColor(),
                  callback: function (value) { return value + "%"; }
                }
              }
            }
          })
        }));
      }

      const revenueCtx = document.getElementById("revenueMonthlyChart");
      if (revenueCtx) {
        state.charts.push(new Chart(revenueCtx, {
          type: "bar",
          data: {
            labels: DATA.revenuePerformance.monthlyKnown.map(function (item) { return item.label; }),
            datasets: [
              {
                label: state.lang === "ar" ? "نقاط الإيراد المؤكدة" : "Confirmed Revenue Markers",
                data: DATA.revenuePerformance.monthlyKnown.map(function (item) { return item.value; }),
                backgroundColor: [
                  getCssVar("--warning"),
                  getCssVar("--gold"),
                  getCssVar("--gold-dim"),
                  getCssVar("--gold-light")
                ],
                borderRadius: 14
              }
            ]
          },
          options: Object.assign(baseChartOptions(), {
            plugins: {
              legend: { display: false },
              tooltip: baseChartOptions().plugins.tooltip
            },
            scales: {
              x: {
                grid: { display: false },
                ticks: { color: chartLabelColor() }
              },
              y: {
                beginAtZero: true,
                grid: { color: "transparent" },
                ticks: {
                  color: chartLabelColor(),
                  callback: function (value) { return formatNumber(value); }
                }
              }
            }
          })
        }));
      }

      const investmentCtx = document.getElementById("investmentDonutChart");
      if (investmentCtx) {
        state.charts.push(new Chart(investmentCtx, {
          type: "doughnut",
          data: {
            labels: [copy.labels.directCosts, copy.labels.indirectCosts],
            datasets: [
              {
                data: [DATA.branches[0].directCosts.subtotal, DATA.branches[0].indirectCosts.subtotal],
                backgroundColor: [getCssVar("--gold"), getCssVar("--chart-indirect")],
                borderColor: [getCssVar("--surface-line-strong"), getCssVar("--surface-line-strong")],
                borderWidth: 1,
                hoverOffset: 6
              }
            ]
          },
          options: Object.assign(baseChartOptions(), {
            cutout: "68%",
            plugins: {
              legend: baseChartOptions().plugins.legend,
              tooltip: baseChartOptions().plugins.tooltip
            }
          })
        }));
      }
    }

    function animateCount(element) {
      const target = Number(element.dataset.target);
      const format = element.dataset.format;
      const duration = 1500;
      const start = performance.now();

      function tick(now) {
        const progress = Math.min((now - start) / duration, 1);
        const eased = 1 - Math.pow(1 - progress, 4);
        const value = target * eased;

        if (format === "currency") {
          element.textContent = formatCurrency(value);
        } else if (format === "percent") {
          element.textContent = formatPercent(value);
        } else {
          element.textContent = formatNumber(value);
        }

        if (progress < 1) {
          requestAnimationFrame(tick);
        } else {
          if (format === "currency") {
            element.textContent = formatCurrency(target);
          } else if (format === "percent") {
            element.textContent = formatPercent(target);
          } else {
            element.textContent = formatNumber(target);
          }
        }
      }

      requestAnimationFrame(tick);
    }

    function initObservers() {
      if (state.revealObserver) {
        state.revealObserver.disconnect();
      }
      if (state.countObserver) {
        state.countObserver.disconnect();
      }

      state.revealObserver = new IntersectionObserver(function (entries) {
        entries.forEach(function (entry) {
          if (entry.isIntersecting) {
            entry.target.classList.add("is-visible");
            state.revealObserver.unobserve(entry.target);
          }
        });
      }, {
        threshold: 0.18
      });

      state.countObserver = new IntersectionObserver(function (entries) {
        entries.forEach(function (entry) {
          if (entry.isIntersecting && !entry.target.dataset.counted) {
            entry.target.dataset.counted = "true";
            animateCount(entry.target);
            state.countObserver.unobserve(entry.target);
          }
        });
      }, {
        threshold: 0.3
      });

      document.querySelectorAll(".reveal").forEach(function (node) {
        state.revealObserver.observe(node);
      });

      document.querySelectorAll(".countup").forEach(function (node) {
        state.countObserver.observe(node);
      });
    }

    document.getElementById("langToggle").addEventListener("click", function () {
      state.lang = state.lang === "ar" ? "en" : "ar";
      renderApp();
      window.scrollTo({ top: 0, behavior: "smooth" });
    });

    renderApp();
  </script>
</body>
</html>
